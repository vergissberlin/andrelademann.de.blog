name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Rebuild hourly so posts with a future pubDatetime go live without a manual push.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v7

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: "11.7.0"

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🚀 Build site"
        env:
          PUBLIC_SWETRIX_PID: ${{ secrets.PUBLIC_SWETRIX_PID }}
        run: pnpm build

      - name: "📤 Upload Pages artifact"
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "🌐 Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v5
