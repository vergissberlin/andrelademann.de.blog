<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" class="bg"/>
  <text
    x="16" y="22"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="15"
    letter-spacing="1"
    class="fg">AL</text>
  <rect x="8" y="25.5" width="16" height="2.5" rx="1.25" class="accent"/>
  <style>
    .bg     { fill: #212737; }
    .fg     { fill: #eaedf3; }
    .accent { fill: #ff6b01; }
    @media (prefers-color-scheme: light) {
      .bg     { fill: #fdfdfd; }
      .fg     { fill: #282728; }
      .accent { fill: #006cac; }
    }
  </style>
</svg>
